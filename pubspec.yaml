name: myfinance
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.2
  path: ^1.8.3
  cupertino_icons: ^1.0.8

  # QR scanning
  mobile_scanner: ^5.2.3

  # Bill OCR
  google_mlkit_text_recognition: ^0.13.0

  # Open GPay / UPI
  url_launcher: ^6.3.1

  # Camera / bill photo
  image_picker: ^1.1.2

  # Runtime permissions
  permission_handler: ^11.3.1

  # First-launch & flags
  shared_preferences: ^2.3.2

  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  sqlite3: ^3.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
