workflows:
  ios-build:
    name: iOS Build (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Build iOS (no signing)
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r MyFinance.ipa Payload

    artifacts:
      - build/ios/iphoneos/MyFinance.ipa

    publishing:
      email:
        recipients:
          - your@email.com        # ← change to your email
        notify:
          success: true
          failure: true
